name: Daily Video Assembly

on:
  schedule:
    # Runs daily at 08:00 UTC. Adjust as needed (cron is in UTC).
    - cron: "0 8 * * *"
  workflow_dispatch: {}  # allows manual "Run workflow" button too

jobs:
  build-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install gTTS requests

      - name: Run video assembly
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/assemble_video.py

      - name: Commit output files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ input/*.done
          git diff --staged --quiet || git commit -m "Add generated video $(date -u +%Y-%m-%d)"
          git push
